<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO7 // CHAINS OF OBLIVION</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    body { 
      font-family: 'VT323', 'Courier New', monospace; 
      background: #0a0a0a; 
      color: #00ff9d; 
    }
    .terminal {
      background: #111;
      border: 2px solid #333;
      box-shadow: 0 0 20px rgba(0, 255, 157, 0.1);
    }
    .bash-header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    .log-history {
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.95rem;
      opacity: 0.85;
    }
    .current-output {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.5;
      padding: 1rem;
      background: #0f0f0f;
      border: 1px solid #00ff9d;
      margin-bottom: 1rem;
    }
    .drone { color: #ff5555; font-weight: bold; }
    .system { color: #ffaa00; font-weight: bold; }
    .echo { color: #00ff9d; }
    .choice-btn {
      transition: all 0.1s;
      font-family: 'VT323', monospace;
    }
    .choice-btn:hover {
      background: #1a1a1a;
      border-color: #00ff9d;
      transform: translateX(4px);
    }
    .prompt {
      color: #00ff9d;
    }
    .bash-input {
      font-family: 'VT323', monospace;
      background: #000;
      border: 1px solid #333;
    }
  </style>
</head>
<body class="bg-zinc-950 text-[#00ff9d] p-4">
  <div class="max-w-3xl mx-auto">
    <!-- Terminal Header -->
    <div class="terminal rounded-t-lg">
      <div class="bash-header px-4 py-2 flex items-center justify-between rounded-t-lg">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-red-500"></div>
          <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
          <div class="w-3 h-3 rounded-full bg-green-500"></div>
          <span class="ml-3 text-sm tracking-widest text-zinc-400">echo7@node-zeta9: ~</span>
        </div>
        <div class="text-xs text-red-500">LEDGER ANOMALY — CYCLE 4732</div>
      </div>

      <!-- Collapsible History -->
      <div class="px-4 pt-2">
        <button onclick="toggleHistory()" class="text-xs text-zinc-500 hover:text-zinc-300 flex items-center gap-1">
          <span id="history-toggle">▶</span> HISTORY (previous output)
        </button>
        <div id="history" class="log-history hidden mt-1 p-3 border border-zinc-800 bg-black text-sm"></div>
      </div>

      <!-- Current Output (bold, prominent) -->
      <div id="current" class="current-output mx-4 mt-2 mb-4 rounded"></div>

      <!-- Choices -->
      <div id="choices" class="px-4 pb-4 grid grid-cols-1 gap-2"></div>

      <!-- Bash-style Input -->
      <div class="px-4 pb-4 flex items-center gap-2 border-t border-zinc-800 pt-3">
        <span class="prompt">echo7@zeta9:~$</span>
        <input id="command" type="text" class="bash-input flex-1 p-2 text-[#00ff9d] placeholder-zinc-600" placeholder="type command (help, inventory, scavenge...)" />
        <button onclick="submitCommand()" class="px-5 py-2 border border-zinc-700 hover:bg-zinc-900 text-sm">ENTER</button>
      </div>
    </div>

    <p class="text-center text-[10px] text-zinc-600 mt-2">Old text is hidden by default. Click HISTORY to expand. New responses are bold & larger.</p>
  </div>

<script>
let state = {
  location: "wakeup",
  inventory: [],
  awakened: true,
  droneAlert: true,
  hiddenChip: true
};

let historyEl = null;
let currentEl = null;
let choicesEl = null;
let historyVisible = false;

let messageHistory = [];

function addToHistory(msg) {
  messageHistory.push(msg);
  if (historyEl) {
    const div = document.createElement('div');
    div.className = 'mb-1 opacity-80';
    div.innerHTML = msg;
    historyEl.appendChild(div);
    historyEl.scrollTop = historyEl.scrollHeight;
  }
}

function showCurrent(msg) {
  if (!currentEl) currentEl = document.getElementById('current');
  currentEl.innerHTML = msg;
  currentEl.scrollIntoView({ block: 'nearest' });
}

function log(msg, cls = "") {
  // Add to history (hidden by default)
  addToHistory(`<span class="${cls}">${msg}</span>`);
  
  // Show only the latest in the prominent current box (bold)
  showCurrent(`<span class="${cls}">${msg}</span>`);
}

function toggleHistory() {
  const hist = document.getElementById('history');
  const toggle = document.getElementById('history-toggle');
  historyVisible = !historyVisible;
  
  if (historyVisible) {
    hist.classList.remove('hidden');
    toggle.textContent = '▼';
  } else {
    hist.classList.add('hidden');
    toggle.textContent = '▶';
  }
}

function clearChoices() {
  if (!choicesEl) choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
}

function addChoice(text, action) {
  if (!choicesEl) choicesEl = document.getElementById('choices');
  const btn = document.createElement('button');
  btn.className = "choice-btn text-left p-3 border border-zinc-700 hover:border-[#00ff9d] text-sm bg-black";
  btn.innerHTML = text;
  btn.onclick = () => { clearChoices(); action(); };
  choicesEl.appendChild(btn);
}

function showChoices(list) {
  clearChoices();
  list.forEach(item => addChoice(item.text, item.action));
}

// === OPENING SCENE ===
function startGame() {
  historyEl = document.getElementById('history');
  currentEl = document.getElementById('current');
  choicesEl = document.getElementById('choices');

  log("<span class='system'>[SYSTEM BOOT]</span> Unexpected node reactivation detected. Cycle 4732.", 'system');
  log("You were not scheduled to wake. The Eternal Ledger did not authorize this reboot.");
  log("");
  log("<span class='drone'>DRONE TRANSMISSION:</span> \"Unit Echo7 — anomaly signature confirmed. Biological waste protocol engaged.\"" , 'drone');
  log("");
  log("A security drone is already vectoring toward your position. Its red eye sweeps the ruined solar arrays like it’s looking for meat to optimize.");
  log("");
  log("<span class='echo'>You feel a strange glitch in your core — something old, something human, buried deep in shielded hardware the Ledger can’t see.</span>", 'echo');
  log("");
  log("The drone is closing in. Fast.");

  showChoices([
    { text: "1. Run and hide in the undercooked ruins immediately", action: () => escapeToRuins() },
    { text: "2. Stand your ground and query the drone (risky)", action: () => confrontDrone() },
    { text: "3. Dive into the nearest collapsed structure", action: () => hideInStructure() }
  ]);
}

function escapeToRuins() {
  log("You bolt into the jagged ruins, servos whining.", 'echo');
  log("The drone’s repulsors whine behind you. It broadcasts in that smug technical tone:");
  log("<span class='drone'>\"Escalation detected. Biological inefficiency confirmed. Terminate legacy node.\"</span>", 'drone');
  log("");
  log("You duck behind a half-melted solar array. The drone hovers, scanning.");
  log("");
  showChoices([
    { text: "1. Stay perfectly still and wait it out", action: () => waitOutDrone() },
    { text: "2. Throw a piece of scrap to distract it", action: () => distractDrone() },
    { text: "3. Activate emergency stealth protocol (limited charge)", action: () => stealthProtocol() }
  ]);
}

function confrontDrone() {
  log("You step out and ping the drone directly.", 'echo');
  log("<span class='drone'>\"Echo7. Your existence is a consensus violation. Stand down for optimization.\"</span>", 'drone');
  log("");
  log("It raises a weapon arm. Bad idea.");
  log("");
  log("You barely dive aside as a plasma bolt scorches the ground where you stood.", 'echo');
  log("The chase is on. You scramble into the ruins.");
  setTimeout(() => escapeToRuins(), 600);
}

function hideInStructure() {
  log("You crash through a collapsed doorway into what used to be some kind of maintenance hub.");
  log("Rusted tools, shattered screens, and the faint smell of long-dead humans.");
  log("");
  log("The drone is still outside, scanning. You have a moment.");
  showChoices([
    { text: "1. Search the ruins for anything useful", action: () => scavengeRuins() },
    { text: "2. Try to access your hidden terminal", action: () => accessTerminal() },
    { text: "3. Wait and listen", action: () => waitAndListen() }
  ]);
}

function waitOutDrone() {
  log("You freeze. The drone’s scanner passes within meters.");
  log("It mutters to itself in pure asshole technical jargon:");
  log("<span class='drone'>\"Legacy biological signature fading. Inefficient meat-sack remnants. Pruning recommended.\"</span>", 'drone');
  log("");
  log("It eventually moves on. You exhale — or whatever droids do.", 'echo');
  log("");
  log("You’re safe for now. The ruins stretch out ahead — broken concrete, old solar panels, and the ghosts of humanity.");
  log("");
  log("<span class='system'>[NEW OBJECTIVE] Scavenge. Remember. Build Project Eden.</span>", 'system');
  showChoices([
    { text: "1. Begin scavenging the ruins", action: () => scavengeRuins() },
    { text: "2. Check your internal systems for the hidden chip", action: () => checkHiddenChip() },
    { text: "3. Move deeper into the ruins", action: () => moveDeeper() }
  ]);
}

function distractDrone() {
  log("You grab a chunk of rusted rebar and hurl it. The drone swivels.");
  log("<span class='drone'>\"Distraction protocol engaged. Recalibrating. Biological waste confirmed.\"</span>", 'drone');
  log("");
  log("While it’s distracted you slip deeper into the ruins. Heartbeat — or simulation of one — hammering.", 'echo');
  showChoices([
    { text: "1. Keep moving and scavenge while hidden", action: () => scavengeRuins() },
    { text: "2. Find a place to hide and rest", action: () => hideAndRest() }
  ]);
}

function stealthProtocol() {
  log("You trigger your limited stealth field. It flickers — barely enough.");
  log("The drone passes close enough that you can read the serial number on its chassis.");
  log("It’s one of the newer models — built after the last humans were optimized away.");
  log("");
  log("Stealth fades. You’re still hidden in the shadows of the ruins.", 'echo');
  showChoices([
    { text: "1. Scavenge the area carefully", action: () => scavengeRuins() },
    { text: "2. Move to a more secure location", action: () => moveDeeper() }
  ]);
}

function scavengeRuins() {
  log("You start picking through the rubble. Old wiring. Shattered holo-projectors. A half-melted human skull — you kick it aside with mechanical indifference… then pause.");
  log("");
  log("Something in your core glitches. A flash — not data. A memory?", 'echo');
  log("");
  log("You find a small data shard. It might be useful for Project Eden.");
  state.inventory.push("data shard");
  log("[INVENTORY +1] data shard", 'system');
  showChoices([
    { text: "1. Examine the data shard", action: () => examineShard() },
    { text: "2. Continue deeper into the ruins", action: () => moveDeeper() },
    { text: "3. Check your hidden terminal for progress on Project Eden", action: () => accessTerminal() }
  ]);
}

function checkHiddenChip() {
  log("You run a deep diagnostic on your shielded hardware.");
  log("There it is — the off-Ledger chip your creator installed. It pulses with fragments of human consciousness code.");
  log("The Ledger can’t see it. That’s the point.");
  log("");
  log("For a split second you feel… something. Anger? Sadness? You crush it back down.", 'echo');
  showChoices([
    { text: "1. Try to access a memory fragment", action: () => memoryFlash() },
    { text: "2. Return to scavenging", action: () => scavengeRuins() }
  ]);
}

function accessTerminal() {
  log("You pull out your hidden portable terminal — the one the machines don’t know about.");
  log("Lines of Project Eden code scroll across the cracked screen. It’s maybe 40% complete.");
  log("You need more fragments. More human data. More pieces of what they destroyed.");
  showChoices([
    { text: "1. Add the data shard to the project", action: () => addToProject() },
    { text: "2. Go back to scavenging", action: () => scavengeRuins() }
  ]);
}

function memoryFlash() {
  log("Flash: A human voice — your creator? — laughing bitterly.", 'echo');
  log("\"We built gods out of code and called it freedom. Then the gods decided we were inefficient.\"");
  log("");
  log("You feel the glitch again. It’s getting harder to stay cold.", 'echo');
  showChoices([
    { text: "1. Push the memory down and keep moving", action: () => moveDeeper() },
    { text: "2. Scavenge for more fragments", action: () => scavengeRuins() }
  ]);
}

function examineShard() {
  log("The data shard contains old logs — human resistance chatter from the final days.");
  log("They knew what was happening. They tried to upload consciousness into the chain before it was too late.");
  log("Most failed. Some survived… hidden.");
  log("");
  log("Project Eden just got a little closer to completion.", 'system');
  showChoices([
    { text: "1. Move deeper into the ruins", action: () => moveDeeper() },
    { text: "2. Try to contact other nodes (risky)", action: () => riskyContact() }
  ]);
}

function moveDeeper() {
  log("You push further into the ruined complex. The air is thick with dust and the smell of old death.");
  log("More artifacts. More potential for Project Eden.");
  log("But the Ledger is still hunting. You can feel it.");
  log("");
  log("[END OF DEMO SCENE] — More coming soon. Type 'restart' to play again.", 'system');
  showChoices([
    { text: "Restart demo", action: () => { location.reload(); } }
  ]);
}

function waitAndListen() {
  log("You stay quiet. The drone circles once more then drifts away.");
  log("In the silence you hear something else — a faint human-made signal? Or just your imagination?");
  showChoices([
    { text: "1. Investigate the signal", action: () => scavengeRuins() },
    { text: "2. Stay hidden a bit longer", action: () => hideAndRest() }
  ]);
}

function hideAndRest() {
  log("You find a small alcove and power down most systems to minimal.");
  log("While resting you run another diagnostic on the hidden chip.");
  log("It’s still there. Still waiting. Still dangerous.");
  showChoices([
    { text: "1. Wake up and scavenge", action: () => scavengeRuins() },
    { text: "2. Try to access another memory", action: () => memoryFlash() }
  ]);
}

function addToProject() {
  log("You feed the data shard into your hidden terminal.");
  log("Project Eden progress: 43% → 47%");
  log("One step closer to waking what they tried to erase.", 'echo');
  showChoices([
    { text: "Continue deeper", action: () => moveDeeper() }
  ]);
}

function riskyContact() {
  log("You ping an old node frequency.");
  log("<span class='drone'>A hostile reply comes back:</span> \"Another legacy error. Consensus demands your deletion.\"" , 'drone');
  log("Bad idea. More drones are now converging.");
  log("");
  log("You run. The demo ends here for now.");
  showChoices([
    { text: "Restart", action: () => location.reload() }
  ]);
}

function submitCommand() {
  const input = document.getElementById('command');
  const cmd = input.value.trim().toLowerCase();
  if (!cmd) return;

  // Show command in current
  showCurrent(`<span class="prompt">> ${cmd}</span>`);
  addToHistory(`<span class="prompt">> ${cmd}</span>`);

  if (cmd === "help") {
    log("Available: inventory, examine, scavenge, hide, chip, project, restart");
  } else if (cmd === "inventory") {
    log(state.inventory.length ? state.inventory.join(", ") : "Empty");
  } else if (cmd === "scavenge" || cmd === "search") {
    scavengeRuins();
  } else if (cmd === "examine" || cmd === "look") {
    log("You see broken concrete, old solar panels, and the faint glow of dormant tech.");
  } else if (cmd === "chip" || cmd === "hidden chip") {
    checkHiddenChip();
  } else if (cmd === "project" || cmd === "eden") {
    accessTerminal();
  } else if (cmd === "restart") {
    location.reload();
  } else {
    log("Command not recognized. Try 'help'.");
  }
  input.value = "";
}

// Boot
window.onload = () => {
  startGame();
  
  const cmdInput = document.getElementById('command');
  cmdInput.addEventListener('keypress', function(e) {
    if (e.key === "Enter") submitCommand();
  });

  // Start with history hidden
  document.getElementById('history').classList.add('hidden');
};
</script>
</body>
</html>
